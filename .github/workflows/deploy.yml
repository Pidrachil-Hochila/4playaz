name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Generate static site
        run: npm run generate
        working-directory: frontend
        env:
          NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/
          # Empty string: client-side fetches fall back to app.baseURL (/4playaz)
          # which maps to the prerendered /api/products static file on GitHub Pages
          NUXT_PUBLIC_API_BASE: ""

      - name: Copy API data files
        run: |
          mkdir -p frontend/.output/public/api
          cp backend/data/products.json frontend/.output/public/api/products
          cp backend/data/collections.json frontend/.output/public/api/collections

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
